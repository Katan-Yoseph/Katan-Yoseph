<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Cleaner Pro</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #238636;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 { color: #fff; margin-top: 0; }
        p { color: #8b949e; }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            box-sizing: border-box;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background-color: #2ea043; }

        #result {
            margin-top: 25px;
            padding: 15px;
            background: #000;
            border-radius: 6px;
            border-left: 4px solid var(--accent);
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
            display: none;
        }

        .regex-badge {
            background: #21262d;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #58a6ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔗 Link Cleaner</h1>
        <p>Cole o texto sujo (com HTML ou aspas) abaixo para extrair URLs limpas.</p>
        <p>Usando Regex: <code class="regex-badge">https?://[^\s&lt;&gt;"]+</code></p>

        <textarea id="input" placeholder="Cole aqui seu código HTML ou logs de e-mail..."></textarea>
        
        <button onclick="cleanLinks()">Extrair e Limpar Links</button>

        <div id="result"></div>
    </div>

    <script>
        function cleanLinks() {
            const input = document.getElementById('input').value;
            const regex = /https?:\/\/[^\s<>"]+/g;
            const matches = input.match(regex);
            const resultDiv = document.getElementById('result');

            if (matches) {
                // Remove duplicatas e limpa espaços
                const uniqueLinks = [...new Set(matches)];
                resultDiv.innerText = uniqueLinks.join('\n\n');
                resultDiv.style.display = 'block';
            } else {
                resultDiv.innerText = "Nenhum link encontrado.";
                resultDiv.style.display = 'block';
            }
        }
    </script>

</body>
</html>
